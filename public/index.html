
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doomsage Link Shortener</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS (for rapid UI overhaul) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              doomsage: {
                dark: '#050505',
                card: '#0c0c0e',
                cyan: '#00f0ff',
                purple: '#bd00ff',
              }
            }
          }
        }
      }
    </script>

    <!-- Custom CSS to keep your existing logical classes and add the grid glow -->
    <style>
      body {
        background-color: #050505;
        color: #ffffff;
      }
      
      /* JS Target Logic Classes */
      .hidden { display: none !important; }
      
      /* Futuristic Grid Glow Background */
      .grid-glow {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-size: 50px 50px;
        background-image: 
          linear-gradient(to right, rgba(0, 240, 255, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
        mask-image: radial-gradient(ellipse at top, black 20%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at top, black 20%, transparent 80%);
      }

      /* Animated Gradient Border for Card */
      .card-wrapper {
        position: relative;
      }
      .card-wrapper::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 1.1rem;
        background: linear-gradient(45deg, #00f0ff, #bd00ff, #00f0ff);
        z-index: -1;
        filter: blur(10px);
        opacity: 0.3;
        transition: opacity 0.3s ease;
      }
      .card-wrapper:hover::before {
        opacity: 0.5;
      }

      /* Custom Spinner for the button */
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #ffffff;
        border-radius: 50%;
        width: 1.25rem;
        height: 1.25rem;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-left: 0.5rem;
        vertical-align: middle;
      }
      
      @keyframes spin { 
        to { transform: rotate(360deg); } 
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 font-sans selection:bg-doomsage-purple selection:text-white">
    
    <!-- Background Effect -->
    <div class="grid-glow" aria-hidden="true"></div>

    <main class="container w-full max-w-lg z-10">
      <section class="card-wrapper">
        <div class="card bg-doomsage-card border border-white/10 rounded-2xl p-8 md:p-10 shadow-2xl backdrop-blur-xl">
          
          <!-- Header section -->
          <div class="mb-8 text-center">
            <p class="brand text-doomsage-cyan font-mono text-xs tracking-[0.3em] uppercase mb-3">Doomsage // Link</p>
            <h1 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500">
              Shorten URLs at warp speed.
            </h1>
            <p class="subtitle text-gray-400 text-sm md:text-base">Secure, clean, and built for fast sharing.</p>
          </div>

          <!-- Form -->
          <form id="shortener-form" class="space-y-6" novalidate>
            <div class="flex flex-col gap-2">
              <label for="url" class="text-sm font-medium text-gray-300">Paste your long URL</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500 font-mono text-sm">
                  🔗
                </div>
                <input 
                  id="url" 
                  name="url" 
                  type="url" 
                  placeholder="https://example.com/very/long/link" 
                  class="w-full bg-black/50 border border-gray-800 text-white placeholder-gray-600 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-doomsage-cyan focus:ring-1 focus:ring-doomsage-cyan transition-all font-mono text-sm shadow-inner"
                  required 
                />
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label for="customCode" class="text-sm font-medium text-gray-300">Custom code <span class="text-gray-600 font-normal">(optional)</span></label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500 font-mono text-sm">
                  /
                </div>
                <input 
                  id="customCode" 
                  name="customCode" 
                  type="text" 
                  placeholder="myCode123" 
                  maxlength="40" 
                  class="w-full bg-black/50 border border-gray-800 text-white placeholder-gray-600 rounded-xl pl-8 pr-4 py-3 focus:outline-none focus:border-doomsage-purple focus:ring-1 focus:ring-doomsage-purple transition-all font-mono text-sm shadow-inner"
                />
              </div>
            </div>

            <button id="shortenBtn" type="submit" class="w-full group relative flex justify-center items-center py-3.5 px-4 rounded-xl font-bold text-white bg-gradient-to-r from-doomsage-cyan to-doomsage-purple hover:opacity-90 hover:shadow-[0_0_20px_rgba(189,0,255,0.4)] transition-all duration-300 overflow-hidden">
              <span class="absolute inset-0 w-full h-full bg-white/20 group-hover:translate-x-full transition-transform duration-500 ease-out -translate-x-full z-0"></span>
              <span class="btn-label relative z-10">Shorten Link</span>
              <span class="spinner hidden relative z-10" aria-hidden="true"></span>
            </button>
          </form>

          <!-- Status & Results -->
          <p id="error" class="error hidden mt-5 p-3 rounded-lg bg-red-950/50 border border-red-500/30 text-red-400 text-sm font-medium text-center" role="alert"></p>

          <article id="result" class="result hidden mt-6 p-1 rounded-xl bg-gradient-to-r from-doomsage-cyan/30 to-doomsage-purple/30" aria-live="polite">
            <div class="bg-doomsage-dark rounded-lg p-5">
              <p class="text-xs text-gray-400 uppercase tracking-wider mb-2 font-semibold">Short URL Ready</p>
              <div class="result-row flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                <div class="flex-1 overflow-hidden bg-black/50 rounded-lg border border-gray-800 p-3 flex items-center">
                  <a id="shortUrl" href="#" target="_blank" rel="noopener noreferrer" class="text-doomsage-cyan font-mono text-sm truncate hover:underline hover:text-white transition-colors block w-full"></a>
                </div>
                <button id="copyBtn" type="button" class="whitespace-nowrap px-5 py-3 rounded-lg font-mono text-sm font-bold text-white bg-white/10 hover:bg-white/20 border border-white/10 transition-colors">
                  Copy
                </button>
              </div>
              <p id="copyState" class="copy-state hidden mt-2 text-green-400 text-xs font-mono text-right">✓ Copied to clipboard!</p>
            </div>
          </article>

        </div>
      </section>
    </main>

    <!-- Original External Scripts (Logic Untouched) -->
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app.js" defer></script>
  </body>
</html>

```
