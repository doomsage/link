  <style>
    :root {
      --neon-cyan: #00f0ff;
      --neon-purple: #b026ff;
      --dark-bg: #050507;
    }

    body {
      font-family: 'Inter', sans-serif;

      color: #e2e8f0;
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;

    /* Animated Grid Background */
    .bg-grid {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: 50px 50px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      z-index: -2;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    /* Glowing Orbs */
    .glow-orb-1, .glow-orb-2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.5;
      animation: float 10s infinite alternate ease-in-out;
    }
    
    .glow-orb-1 {
      width: 400px; height: 400px;
      background: var(--neon-purple);
      top: -100px; left: -100px;
    }
    
    .glow-orb-2 {
      width: 300px; height: 300px;
      background: var(--neon-cyan);
      bottom: -100px; right: -50px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0); }

    }

    /* Glass Card */
    .glass-card {
      background: rgba(15, 15, 20, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02);
      position: relative;
    }

    /* Animated Border Top */
    .glass-card::before {
      content: '';

      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);

    .cool-input {

    .cool-input:focus {
      border-color: var(--neon-cyan);

    }

    /* Button Hover Effect */
    .btn-glow {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-glow::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg);
      transition: all 0.5s ease;

    .btn-glow:hover::after {
      left: 200%;
    }

    /* Spinner */
    .spinner {

    .hidden { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

      </div>

      <form id="shortener-form" class="space-y-5" novalidate>
        
        <div>
          <label for="url" class="block text-sm font-medium text-slate-300 mb-1.5">Paste your long URL</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
              </svg>

  <!-- JS just for visual functionality of the design -->
  <script>
    const form = document.getElementById('shortener-form');
    const shortenBtn = document.getElementById('shortenBtn');
    const btnLabel = document.querySelector('.btn-label');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const shortUrlEl = document.getElementById('shortUrl');
    const copyBtn = document.getElementById('copyBtn');
    const copyIcon = document.getElementById('copyIcon');
    const copyText = document.getElementById('copyText');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const urlInput = document.getElementById('url').value;
      if(!urlInput) {
        showError("Error: URL field cannot be empty.");
        return;
      }

      // Hide errors, hide result, show loading
      errorEl.classList.add('hidden');
      resultDiv.classList.add('hidden');
      btnLabel.textContent = 'Processing...';
      spinner.classList.remove('hidden');
      shortenBtn.classList.add('opacity-80', 'cursor-not-allowed');
      
      // Simulate API Call (Fake delay)
      setTimeout(() => {
        btnLabel.textContent = 'Initialize Sequence';
        spinner.classList.add('hidden');
        shortenBtn.classList.remove('opacity-80', 'cursor-not-allowed');
        
        // Generate Fake Link
        const code = document.getElementById('customCode').value || Math.random().toString(36).substring(2, 7);
        const generatedLink = `https://link.doomsage.in/${code}`;
        
        shortUrlEl.href = generatedLink;
        shortUrlEl.textContent = generatedLink;
        
        // Show result
        resultDiv.classList.remove('hidden');
        
        // Reset copy button state
        copyText.textContent = 'Copy';
        copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />';
        copyBtn.classList.remove('text-green-400', 'border-green-500/50');
        
      }, 1500);
    });

    copyBtn.addEventListener('click', () => {
      // Simulate Copy action
      navigator.clipboard.writeText(shortUrlEl.textContent).then(() => {
        copyText.textContent = 'Copied!';
        copyBtn.classList.add('text-green-400', 'border-green-500/50');
        copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />';
        
        setTimeout(() => {
          copyText.textContent = 'Copy';
          copyBtn.classList.remove('text-green-400', 'border-green-500/50');
          copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />';
        }, 3000);
      });
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
      errorEl.classList.add('fade-in');
    }
  </script>
