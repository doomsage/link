<html lang="en">

    <style>
      :root {
        --bg-color: #050508;
        --card-bg: rgba(15, 15, 20, 0.75);
        --text-main: #f0f0f5;
        --text-muted: #8a8a9e;
        --neon-cyan: #00f0ff;
        --neon-purple: #7000ff;
        --error-color: #ff3366;
        --border-color: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
      }

      /* Animated Warp Grid Background */
      .grid-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: 
          linear-gradient(to right, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: -1;
        pointer-events: none;
      }

      .grid-glow::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 80vw;
        height: 80vw;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, transparent 60%);
        filter: blur(60px);
      }

      .grid-glow::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 80%);
      }

      /* Layout */
      .container {
        width: 100%;
        max-width: 540px;
        padding: 20px;
        position: relative;
        z-index: 1;
      }

      /* Glassmorphism Card */
      .card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
      }

      /* Typography */
      .brand {
        font-family: 'JetBrains Mono', monospace;
        color: var(--neon-cyan);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 10px;
        background: linear-gradient(to right, #fff, #a0a0b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 1rem;
        margin-bottom: 32px;
      }

      /* Form Elements */
      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: -12px;
      }

      input {
        width: 100%;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 16px;
        color: var(--text-main);
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
        transition: all 0.3s ease;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      input:focus {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        background: rgba(0, 0, 0, 0.6);
      }

      /* Buttons */
      button {
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      #shortenBtn {
        margin-top: 10px;
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
        color: #fff;
        padding: 16px;
        font-size: 1.1rem;
        box-shadow: 0 4px 20px rgba(112, 0, 255, 0.3);
      }

      #shortenBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(0, 240, 255, 0.4);
      }

      #shortenBtn:active {
        transform: translateY(0);
      }

      /* Spinner Animation */
      .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Utility Classes */
      .hidden {
        display: none !important;
      }

      /* Error Messages */
      .error {
        margin-top: 20px;
        padding: 12px 16px;
        background: rgba(255, 51, 102, 0.1);
        border-left: 4px solid var(--error-color);
        color: var(--error-color);
        border-radius: 4px;
        font-size: 0.9rem;
        font-weight: 500;
      }

      /* Results Area */
      .result {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid var(--border-color);
        animation: fadeIn 0.4s ease forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .result > p:first-child {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 12px;
      }

      .result-row {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(0, 240, 255, 0.2);
      }

      #shortUrl {
        flex-grow: 1;
        color: var(--neon-cyan);
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.05rem;
        text-decoration: none;
        word-break: break-all;
        text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
      }

      #shortUrl:hover {
        text-decoration: underline;
      }

      #copyBtn {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        font-size: 0.9rem;
      }

      #copyBtn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--text-main);
      }

      .copy-state {
        margin-top: 12px;
        color: #00ff9d;
        font-size: 0.85rem;
        font-weight: 500;
        text-align: right;
      }

      /* Responsive adjustments */
      @media (max-width: 480px) {
        .card { padding: 24px; }
        h1 { font-size: 1.8rem; }
        .result-row { flex-direction: column; align-items: stretch; }
        #copyBtn { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="grid-glow" aria-hidden="true"></div>
    <main class="container">
      <section class="card">
        <p class="brand">DOOMSAGE // LINK</p>
        <h1>Shorten URLs at warp speed.</h1>
        <p class="subtitle">Secure, clean, and built for fast sharing.</p>

        <form id="shortener-form" novalidate>
          <label for="url">Paste your long URL</label>
          <input id="url" name="url" type="url" placeholder="https://example.com/very/long/link" required />

          <label for="customCode">Custom code (optional)</label>
          <input id="customCode" name="customCode" type="text" placeholder="myCode123" maxlength="40" />

          <button id="shortenBtn" type="submit">
            <span class="btn-label">Shorten</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>

        <p id="error" class="error hidden" role="alert"></p>

        <article id="result" class="result hidden" aria-live="polite">
          <p>Short URL ready:</p>
          <div class="result-row">
            <a id="shortUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button id="copyBtn" type="button">Copy</button>
          </div>
          <p id="copyState" class="copy-state hidden">Copied!</p>
        </article>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
