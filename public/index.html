
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doomsage Link Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- CYBERPUNK HACKER TERMINAL UI --- */
      :root {
        --bg: #030405;
        --neon-cyan: #00f3ff;
        --neon-pink: #ff0055;
        --danger-red: #ff1e1e;
        --dark-panel: rgba(10, 15, 20, 0.85);
        --grid-color: rgba(0, 243, 255, 0.1);
        --font-main: 'Rajdhani', sans-serif;
        --font-code: 'Share Tech Mono', monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      ::selection {
        background: var(--neon-cyan);
        color: #000;
      }

      body {
        background-color: var(--bg);
        color: var(--neon-cyan);
        font-family: var(--font-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
        background-image: 
          linear-gradient(var(--grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center center;
      }

      /* Animated Radar/Grid Background */
      body::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 200%; height: 200%;
        background: radial-gradient(circle at center, transparent 30%, var(--bg) 80%);
        z-index: 0;
      }

      /* HUD Decorative Elements */
      .hud-decor {
        position: absolute;
        font-family: var(--font-code);
        font-size: 0.75rem;
        color: rgba(0, 243, 255, 0.4);
        pointer-events: none;
        z-index: 1;
        letter-spacing: 2px;
      }

      .hud-top-left { top: 30px; left: 30px; border-left: 2px solid var(--neon-pink); padding-left: 10px; }
      .hud-bottom-right { bottom: 30px; right: 30px; text-align: right; border-right: 2px solid var(--neon-cyan); padding-right: 10px; }
      
      /* Main Terminal Container */
      .terminal-wrapper {
        position: relative;
        width: 100%;
        max-width: 650px;
        z-index: 10;
        padding: 3px;
        /* Glowing Gradient Border */
        background: linear-gradient(45deg, var(--neon-cyan), transparent 40%, transparent 60%, var(--neon-pink));
        clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
        animation: border-pulse 4s infinite alternate;
      }

      @keyframes border-pulse {
        0% { filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        100% { filter: drop-shadow(0 0 25px var(--neon-pink)); }
      }

      .terminal-core {
        background: var(--dark-panel);
        backdrop-filter: blur(10px);
        clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      /* Holographic Scanning Line */
      .scanner-line {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 5px;
        background: var(--neon-cyan);
        box-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan);
        opacity: 0.5;
        animation: scan 3s linear infinite;
        pointer-events: none;
      }

      @keyframes scan {
        0% { top: -10%; opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { top: 110%; opacity: 0; }
      }

      /* Header & Title */
      .sys-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        padding-bottom: 15px;
        margin-bottom: 30px;
      }

      .brand {
        font-family: var(--font-code);
        color: var(--neon-pink);
        font-size: 1.2rem;
        font-weight: bold;
        text-shadow: 0 0 10px var(--neon-pink);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand::before {
        content: '';
        display: inline-block;
        width: 12px; height: 12px;
        background: var(--neon-pink);
        box-shadow: 0 0 10px var(--neon-pink);
        animation: blink 1s infinite;
      }

      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

      h1 {
        font-size: 2.8rem;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.1;
        text-shadow: 2px 2px 0px var(--neon-pink), -2px -2px 0px var(--neon-cyan);
        position: relative;
        display: inline-block;
      }

      /* Glitch Effect on Title Hover */
      h1:hover { animation: text-glitch 0.2s infinite; }

      @keyframes text-glitch {
        0% { transform: translate(0); text-shadow: 2px 2px 0px var(--neon-pink), -2px -2px 0px var(--neon-cyan); }
        25% { transform: translate(-2px, 2px); text-shadow: -2px -2px 0px var(--neon-pink), 2px 2px 0px var(--neon-cyan); }
        50% { transform: translate(2px, -2px); text-shadow: 2px -2px 0px var(--neon-pink), -2px 2px 0px var(--neon-cyan); }
        75% { transform: translate(-2px, -2px); }
        100% { transform: translate(0); }
      }

      .subtitle {
        font-family: var(--font-code);
        color: #8fa3b0;
        margin-top: 10px;
        font-size: 0.9rem;
      }

      /* Forms and Inputs */
      form { display: flex; flex-direction: column; position: relative; z-index: 2; }

      .input-group {
        position: relative;
        margin-bottom: 30px;
      }

      label {
        font-family: var(--font-code);
        font-size: 0.85rem;
        color: var(--neon-cyan);
        text-transform: uppercase;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 8px;
        text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
      }

      input {
        width: 100%;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 243, 255, 0.3);
        border-left: 4px solid var(--neon-cyan);
        padding: 16px 20px;
        color: #fff;
        font-family: var(--font-code);
        font-size: 1.1rem;
        outline: none;
        transition: all 0.3s;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
      }

      input:focus {
        border-color: var(--neon-pink);
        border-left-color: var(--neon-pink);
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.3), inset 0 0 10px rgba(255, 0, 85, 0.1);
        background: rgba(20, 5, 10, 0.8);
      }

      input::placeholder { color: rgba(255, 255, 255, 0.2); }

      /* Core Reactor Button */
      button[type="submit"] {
        background: transparent;
        color: var(--neon-cyan);
        border: 2px solid var(--neon-cyan);
        padding: 18px;
        font-family: var(--font-main);
        font-weight: 700;
        font-size: 1.4rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-top: 10px;
        clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      }

      /* Button Hover Power Surge */
      button[type="submit"]::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: var(--neon-cyan);
        transition: all 0.4s ease-in-out;
        z-index: -1;
      }

      button[type="submit"]:hover {
        color: #000;
        box-shadow: 0 0 30px var(--neon-cyan);
        text-shadow: none;
      }

      button[type="submit"]:hover::before { left: 0; }

      button:disabled { opacity: 0.5; pointer-events: none; }

      .hidden { display: none !important; }

      /* Tech Spinner */
      .spinner {
        width: 24px; height: 24px;
        border: 3px solid transparent;
        border-top-color: #000;
        border-right-color: #000;
        border-radius: 50%;
        animation: tech-spin 0.8s linear infinite;
      }

      button[type="submit"]:not(:hover) .spinner {
        border-top-color: var(--neon-cyan);
        border-right-color: var(--neon-cyan);
      }

      @keyframes tech-spin { 100% { transform: rotate(360deg); } }

      /* Error Alert - Danger Protocol */
      .error {
        margin-top: 20px;
        padding: 15px;
        background: rgba(255, 30, 30, 0.1);
        border-left: 4px solid var(--danger-red);
        color: var(--danger-red);
        font-family: var(--font-code);
        font-size: 1rem;
        text-transform: uppercase;
        animation: glitch-anim 0.3s infinite;
      }

      /* Decrypted Data Box (Result) */
      .result {
        margin-top: 30px;
        padding: 25px;
        background: rgba(0, 243, 255, 0.05);
        border: 1px solid var(--neon-cyan);
        position: relative;
        animation: data-reveal 0.5s ease-out;
        clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      }

      @keyframes data-reveal {
        from { opacity: 0; transform: translateY(20px) scaleY(0); }
        to { opacity: 1; transform: translateY(0) scaleY(1); }
      }

      .result p:first-child {
        color: var(--neon-pink);
        font-family: var(--font-code);
        font-size: 0.9rem;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .result-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border: 1px dashed rgba(0, 243, 255, 0.4);
      }

      #shortUrl {
        color: var(--neon-cyan);
        font-family: var(--font-code);
        font-size: 1.2rem;
        text-decoration: none;
        word-break: break-all;
      }

      #shortUrl:hover { text-decoration: underline; text-shadow: 0 0 10px var(--neon-cyan); }

      #copyBtn {
        background: var(--neon-pink);
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-family: var(--font-main);
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        transition: 0.2s;
      }

      #copyBtn:hover { background: #fff; color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

      .copy-state {
        color: #00ff66;
        font-family: var(--font-code);
        margin-top: 15px;
        text-align: right;
        text-transform: uppercase;
        animation: flash-green 0.5s ease;
      }

      @keyframes flash-green { 0% { opacity: 0; color: #fff; } 100% { opacity: 1; color: #00ff66; } }

      /* Mobile Responsive */
      @media (max-width: 600px) {
        .terminal-core { padding: 25px; }
        h1 { font-size: 2.2rem; }
        .result-row { flex-direction: column; align-items: stretch; }
        #copyBtn { padding: 15px; margin-top: 10px; }
      }
    </style>
  </head>
  <body>
    <!-- Fake HUD Data for extreme coolness -->
    <div class="hud-decor hud-top-left">
      DOOMSAGE_OS v9.9.4<br>
      STATUS: ONLINE<br>
      SECURE_CONN: TRUE
    </div>
    <div class="hud-decor hud-bottom-right">
      TARGET: ACQUIRED<br>
      MEM_USAGE: 42%<br>
      SYS_READY
    </div>

    <main class="terminal-wrapper">
      <section class="terminal-core">
        <div class="scanner-line"></div>
        
        <div class="sys-header">
          <div class="brand">DOOMSAGE // TERMINAL</div>
          <div style="font-family: var(--font-code); color: var(--neon-cyan); font-size: 0.8rem;">[ UPLINK ACTIVE ]</div>
        </div>

        <h1>Link ko warp speed par short karein</h1>
        <p class="subtitle">> Secure, fast, aur extreme sharing ke liye ready.</p>
        <br>

        <form id="shortener-form" novalidate>
          <div class="input-group">
            <label for="url">>> Apna long URL yahan paste karein_</label>
            <input id="url" name="url" type="url" placeholder="https://example.com/very/long/link" required />
          </div>

          <div class="input-group">
            <label for="customCode">>> Custom code (Agar chahiye toh)_</label>
            <input id="customCode" name="customCode" type="text" placeholder="myCode123" maxlength="40" />
          </div>

          <button id="shortenBtn" type="submit">
            <span class="btn-label">SHORTEN KAREIN</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>

        <!-- Ye IDs logic ke liye hain, inhe nahi chheda gaya hai -->
        <p id="error" class="error hidden" role="alert"></p>

        <article id="result" class="result hidden" aria-live="polite">
          <p>[ DATA DECRYPTED: SHORT URL TAIYAR HAI ]</p>
          <div class="result-row">
            <a id="shortUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button id="copyBtn" type="button">COPY KAREIN</button>
          </div>
          <p id="copyState" class="copy-state hidden">> Copy Ho Gaya!</p>
        </article>
      </section>
    </main>

    <!-- Aapke scripts exact waise hi hain -->
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
